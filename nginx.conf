# Paste this file into Coolify's "Custom Nginx Configuration" for this app.
# Location in Coolify: Application > Settings > Custom Nginx Configuration

server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html index.htm;

	location / {
		try_files $uri $uri.html $uri/ =404;
	}

	# Serve the generated 404 page while keeping the HTTP status as 404.
	error_page 404 /404.html;
	location = /404.html {
		internal;
	}

	# Standard 5xx fallback.
	error_page 500 502 503 504 /50x.html;
	location = /50x.html {
		internal;
	}

	# Security headers.
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
	add_header X-Frame-Options "DENY" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Cross-Origin-Opener-Policy "same-origin" always;
	add_header Cross-Origin-Resource-Policy "same-origin" always;
	add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), web-share=(), xr-spatial-tracking=(), fullscreen=(self), picture-in-picture=()" always;

	# CSP tightened for this site:
	# - No JavaScript required.
	# - Inline CSS is required by the shared layout template.
	# - Data URI images are required for the inline SVG favicon.
	add_header Content-Security-Policy "default-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; manifest-src 'self'; frame-src 'none'; worker-src 'none'; upgrade-insecure-requests" always;
}
